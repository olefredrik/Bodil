# Golden fixture for Bodils kompatibilitetstest mot Wenche.
#
# Dette er en komplett, balansert config.yaml som representerer det
# wenche-config-skillen produserer, bygget fra eksempeldataene
# (bankeksport.example.csv + selskap.example.yaml).
#
# CI kjører `wenche valider-aarsregnskap --config` mot denne fila. Går den
# gjennom, aksepterer Wenche fortsatt en Bodil-formet config. Feiler den, har
# Wenches skjema eller valideringsregler endret seg og wenche-config må følge etter.
#
# KUN syntetiske data. Aldri ekte fødselsnummer her (fila versjoneres).
# Oppdater den bare når Bodils output-modell endres bevisst.

