name: Wenche-kompatibilitet

# Bekrefter at Bodils output (golden-fixturet) fortsatt aksepteres av Wenche.
#
# To jobber:
#   pinnet  - kjører mot den Wenche-versjonen Bodil erklærer kompatibilitet med
#             (se CHANGELOG.md). Dette er gaten: gjør den til en required status
#             check i GitHubs branch-ruleset, så blokkeres merge til main hvis
#             Bodil-output slutter å validere.
#   siste   - kjører ukentlig mot nyeste Wenche. Får feile (continue-on-error):
#             en rød kjøring varsler at en kommende Wenche-versjon krever en
#             oppdatering av wenche-config-skillen og en ny kompatibilitetslinje.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # mandag 06:00 UTC
  workflow_dispatch:

env:
  WENCHE_PINNET: "0.31.2"   # må matche kompatibilitetslinjen i CHANGELOG.md

jobs:
  pinnet:
    name: Pinnet Wenche (gate)
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sjekk at pinnet versjon matcher CHANGELOG
        run: |
          changelog_versjon=$(grep -E '^\*\*Testet mot Wenche' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$changelog_versjon" != "$WENCHE_PINNET" ]; then
            echo "WENCHE_PINNET ($WENCHE_PINNET) matcher ikke CHANGELOG ($changelog_versjon)."
            echo "Oppdater begge til samme Wenche-versjon i samme PR."
            exit 1
          fi
          echo "Pinnet versjon og CHANGELOG matcher: $WENCHE_PINNET"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer pinnet Wenche
        run: pip install "wenche==${WENCHE_PINNET}"
      - name: Valider golden-fixturet mot Wenche
        run: wenche valider-aarsregnskap --config tests/fixtures/config.golden.yaml
      - name: Feltnavn-lint
        run: python tests/check_field_names.py
      - name: Folio-import-tester
        run: python tests/test_folio_import.py

  siste:
    name: Nyeste Wenche (varsel)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # continue-on-error: bruddet skal ikke feile workflowen (ingen e-post-spam);
    # i stedet opprettes en issue i steget under. Issuen er varselet.
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer nyeste Wenche
        run: pip install --upgrade wenche
      - name: Valider golden-fixturet mot Wenche
        run: wenche valider-aarsregnskap --config tests/fixtures/config.golden.yaml
      - name: Feltnavn-lint
        run: python tests/check_field_names.py
      - name: Opprett issue ved brudd
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          tittel="Nyeste Wenche bryter Bodil-kompatibilitet"
          eksisterende=$(gh issue list --state open --search "$tittel in:title" --json number --jq '.[0].number // empty')
          if [ -n "$eksisterende" ]; then
            echo "Åpen issue finnes allerede (#$eksisterende), kommenterer i stedet."
            gh issue comment "$eksisterende" --body "Bruddet vedvarer i den ukentlige kjøringen: $RUN_URL"
            exit 0
          fi
          linje1="Den ukentlige kompatibilitetskjøringen mot nyeste Wenche feilet. En nyere Wenche-versjon har sannsynligvis endret feltnavn eller valideringsregler."
          linje2="Kjøring med logg: $RUN_URL"
          linje3="For å fikse: oppdater wenche-config-skillen og tests/fixtures/config.golden.yaml til de nye navnene, og bump WENCHE_PINNET + Testet-mot-Wenche-linjen i CHANGELOG i samme PR."
          gh issue create --title "$tittel" --body "$linje1"$'\n\n'"$linje2"$'\n\n'"$linje3"
